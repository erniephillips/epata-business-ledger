<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPATA Business Ledger</title>
  <link rel="stylesheet" href="/css/site.css?v=20260609-assistance-source">
</head>
<body>
  <div id="testModeBanner" class="test-mode-banner hidden">⚠ TEST MODE — separate test database. Changes here do NOT affect your real data.</div>
  <header class="topbar">
    <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-controls="primarySidebar" aria-expanded="true" title="Collapse menu">
      <span class="sidebar-toggle-icon" aria-hidden="true">←</span>
      <span class="sidebar-toggle-label">Menu</span>
    </button>
    <button id="appBackBtn" class="back-button hidden" title="Go back to the previous app page">← Back</button>
    <div class="brand">
      <div class="logo-mark">E</div>
      <div>
        <h1>EPATA Business Ledger</h1>
        <p>Operations cockpit for money, jobs, proof, invoices, costs, and cleanup.</p>
      </div>
    </div>
    <div class="command-center">
      <span class="command-icon">⌕</span>
      <input id="globalSearch" type="search" placeholder="Search every ledger area...">
    </div>
    <div class="header-actions">
      <button id="localAiHeaderStatus" class="ai-power-status off" type="button" onclick="showPage('localAi')" title="Open Local AI controls">
        <span class="ai-power-dot" aria-hidden="true"></span>
        <span>Local AI Off</span>
      </button>
      <button class="ghost-button" onclick="showPage('estimates')" title="Create estimates and invoices in this unified app.">Estimates / Invoices</button>
      <button id="backupBtn" class="primary-button" title="Downloads a copy of the local SQLite database file into your browser downloads.">Backup DB</button>
    </div>
  </header>

  <main class="shell">
    <aside id="primarySidebar" class="sidebar">
      <nav id="nav"></nav>
      <div class="sidebar-card">
        <strong>Local SQLite</strong>
        <p>One local database for invoices, estimates, jobs, money, proof, and tax prep.</p>
      </div>
    </aside>

    <section class="content">
      <div id="app"></div>
    </section>
  </main>
  <button id="sidebarScrim" class="sidebar-scrim" type="button" aria-label="Close menu" tabindex="-1"></button>

  <div id="modalBackdrop" class="modal-backdrop hidden" role="presentation"></div>
  <section id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <div>
        <h2 id="modalTitle"></h2>
        <p id="modalHelp"></p>
      </div>
      <button class="icon-button" id="modalClose" aria-label="Close">×</button>
    </div>
    <form id="modalForm" class="form-grid"></form>
    <div class="modal-footer">
      <button id="modalCancel" class="ghost-button">Cancel</button>
      <button id="modalSave" class="primary-button">Save</button>
    </div>
  </section>

  <div id="toast" class="toast hidden"></div>
  <div id="tooltip" class="floating-tooltip hidden" role="tooltip"></div>

  <script src="/js/app.js?v=20260609-assistance-source"></script>
</body>
</html>
